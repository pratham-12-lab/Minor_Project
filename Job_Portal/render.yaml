services:
  # Backend API Service
  - type: web
    name: job-portal-backend
    env: node
    plan: starter
    region: singapore
    rootDir: backend
    buildCommand: npm ci --only=production
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: job-portal-backend
          property: port
    healthCheckPath: /
    autoDeploy: true
    
  # Frontend Static Site  
  - type: web
    name: job-portal-frontend
    env: static
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    autoDeploy: true

# Global Environment Variables
envVars:
  # Database Configuration
  - key: MONGO_URI
    generateValue: false
    
  # Authentication & Security
  - key: JWT_SECRET
    generateValue: true
  - key: JWT_EXPIRY
    value: "7d"
    
  # File Storage (Cloudinary)
  - key: CLOUDINARY_CLOUD_NAME
    generateValue: false
  - key: CLOUDINARY_API_KEY
    generateValue: false
  - key: CLOUDINARY_API_SECRET
    generateValue: false
    
  # AI Services
  - key: GEMINI_API_KEY
    generateValue: false
  - key: OPENAI_API_KEY
    generateValue: false
  - key: CHATBOT_PROVIDER
    value: "gemini"
    
  # Application Settings
  - key: APP_NAME
    value: "Job-Portal"
  - key: MAX_FILE_SIZE
    value: "5242880"
  - key: ALLOWED_FILE_TYPES
    value: "image/jpeg,image/png,image/jpg,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    
  # Email Configuration (Optional)
  - key: SMTP_HOST
    value: "smtp.gmail.com"
  - key: SMTP_PORT
    value: "587"
  - key: SMTP_SECURE
    value: "false"
  - key: SMTP_USER
    generateValue: false
  - key: SMTP_PASS
    generateValue: false
    
  # Cross-service URLs (will be auto-populated)
  - key: FRONTEND_URL
    fromService:
      type: web
      name: job-portal-frontend
      property: url
  - key: VITE_API_URL
    fromService:
      type: web
      name: job-portal-backend
      property: url