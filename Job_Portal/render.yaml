services:
  # Backend API Service
  - type: web
    name: job-portal-backend
    env: node
    plan: starter
    region: singapore
    rootDir: backend
    buildCommand: npm ci --only=production
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: job-portal-backend
          property: port
    healthCheckPath: /
    autoDeploy: true
    
  # Frontend Static Site  
  - type: web
    name: job-portal-frontend
    env: static
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    autoDeploy: true