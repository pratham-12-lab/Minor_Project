# SonarQube Project Configuration
sonar.projectKey=job-portal
sonar.projectName=Job Portal
sonar.projectVersion=1.0

# Source code directories
sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/__tests__/**,**/*.test.js,**/*.test.jsx,**/coverage/**

# Test directories
sonar.tests=backend/__tests__,frontend/src/__tests__
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# Coverage reports
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.coverage.exclusions=**/__tests__/**,**/*.test.js,**/*.test.jsx,**/node_modules/**

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Additional settings
sonar.javascript.node.maxspace=4096
